name: test

on:
  push:
    branches:
      - main
  pull_request_target:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
    - name: npm install
      run: |
        npm ci
        npm run compile